project_id = "hush-local"

[db]
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[api]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true

# Mobile demo auth (Phase 3): the app signs users in anonymously rather than
# requiring email signup, matching the PRD's "anon or email for demo" choice.
enable_anonymous_sign_ins = true

# LOCAL DEV ONLY: skips email confirmation so the demo flow needs no mail
# server. A real Supabase project MUST set enable_confirmations = true (or
# omit this override) -- do not carry this section forward unchanged when
# provisioning a production/staging project in a later phase.
[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
